<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกรับ-จ่าย ร้านน้ำ</title>
    <!-- นำเข้าฟอนต์ Prompt จาก Google Fonts เพื่อความสวยงามอ่านง่าย -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- ส่วนที่ 1: CSS ตกแต่งความสวยงาม (UI ระดับ 6) --- */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Prompt', sans-serif; 
        }
        
        body { 
            /* พื้นหลังไล่สีโทนสว่าง สบายตา */
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95); /* พื้นหลังการ์ดสีขาวโปร่งแสงนิดๆ */
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); /* เงาให้การ์ดดูลอยขึ้นมา */
        }
        
        .card-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .card-header h2 { 
            color: #2d3748; 
            font-weight: 600; 
            font-size: 26px;
        }
        
        .card-header p { 
            color: #718096; 
            font-size: 14px; 
            margin-top: 5px; 
        }
        
        .form-group { 
            margin-bottom: 15px; 
        }
        
        label { 
            display: block; 
            font-size: 14px; 
            color: #4a5568; 
            margin-bottom: 6px; 
            font-weight: 500; 
        }
        
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            background-color: #f8fafc;
            transition: all 0.3s ease; /* ทำให้เวลาคลิกเปลี่ยนสีดูนุ่มนวล */
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2); /* ไฮไลท์กรอบตอนพิมพ์ */
        }
        
        .row { 
            display: flex; 
            gap: 15px; 
        }
        
        .row .form-group { 
            flex: 1; /* แบ่งครึ่งความกว้างเท่าๆ กัน */
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            /* ปุ่มกดสีไล่ระดับ ดูมีมิติ */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .btn-submit:hover { 
            transform: translateY(-2px); /* เอฟเฟกต์ยกปุ่มตอนเมาส์ชี้ */
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4); 
        }
        
        .btn-submit:disabled { 
            background: #cbd5e0; 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none; 
        }

        #msg { 
            text-align: center; 
            margin-top: 15px; 
            font-size: 14px; 
            font-weight: 500; 
            min-height: 21px; 
        }
        
        .success-text { color: #38a169; }
        .error-text { color: #e53e3e; }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <h2>บันทึกรับ-จ่าย 🥤</h2>
            <p>ระบบจัดการหลังร้าน (ลงฐานข้อมูลอัตโนมัติ)</p>
        </div>

        <!-- --- ส่วนที่ 2: โครงสร้างแบบฟอร์ม HTML --- -->
        <form id="recordForm" name="google-sheet-form">
            <div class="row">
                <div class="form-group">
                    <label>ประเภท (Type)</label>
                    <select name="type" required>
                        <option value="รายรับ">📈 รายรับ</option>
                        <option value="รายจ่าย">📉 รายจ่าย</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ช่องทาง (Payment)</label>
                    <select name="payment" required>
                        <option value="เงินสด">💵 เงินสด</option>
                        <option value="โอนเงิน/QR">📱 โอนเงิน/QR</option>
                        <option value="แอปเดลิเวอรี">🛵 แอปเดลิเวอรี</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>หมวดหมู่ (Category)</label>
                <input type="text" name="category" placeholder="เช่น เครื่องดื่ม, วัตถุดิบ, เบ็ดเตล็ด" required>
            </div>

            <div class="form-group">
                <label>ชื่อรายการ (Item Name)</label>
                <input type="text" name="itemName" placeholder="เช่น ชาไทยไข่มุก, น้ำแข็ง 1 กระสอบ" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>จำนวน (Qty)</label>
                    <input type="number" name="quantity" placeholder="0" min="1" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>ราคา/หน่วย (Price)</label>
                    <input type="number" name="unitPrice" placeholder="0" min="0" step="0.01" required>
                </div>
            </div>

            <div class="form-group">
                <label>หมายเหตุ (Note)</label>
                <input type="text" name="note" placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)">
            </div>

            <button type="submit" id="btnSubmit" class="btn-submit">💾 บันทึกข้อมูล</button>
            <div id="msg"></div>
        </form>
    </div>

    <!-- --- ส่วนที่ 3: JavaScript สำหรับส่งข้อมูล --- -->
    <script>
        // ใส่ลิงก์ SCRIPT_URL ที่คุณกำหนดมาเรียบร้อยแล้วครับ
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWBue69b0o6KOHypFs30SIMzj6QTyw5l3O-7r3y0q_xF_qkVyISNELN8CQrryfPIt8/exec";

        const form = document.forms['google-sheet-form'];
        const btnSubmit = document.getElementById('btnSubmit');
        const msg = document.getElementById('msg');

        // ฟังก์ชันนี้จะทำงานเมื่อมีการกดปุ่ม "บันทึกข้อมูล"
        form.addEventListener('submit', e => {
            e.preventDefault(); // ป้องกันไม่ให้เบราว์เซอร์รีเฟรชหน้าเว็บ
            
            // เปลี่ยนหน้าตาปุ่มเพื่อบอกผู้ใช้ว่าระบบกำลังประมวลผล
            btnSubmit.innerHTML = 'กำลังบันทึกข้อมูล... ⏳';
            btnSubmit.disabled = true;
            msg.innerHTML = '';

            // ใช้ fetch API ส่งข้อมูลจากฟอร์มไปที่ SCRIPT_URL ในรูปแบบ POST
            fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: new FormData(form) 
            })
            .then(response => {
                // กรณีบันทึกสำเร็จ
                msg.innerHTML = '✅ บันทึกข้อมูลสำเร็จเรียบร้อย!';
                msg.className = 'success-text';
                form.reset(); // ล้างข้อมูลในช่องกรอกทั้งหมด
                resetButton(); // คืนสภาพปุ่มกลับมาเหมือนเดิม
                
                // ตั้งเวลาให้ข้อความแจ้งเตือนหายไปเองใน 3.5 วินาที
                setTimeout(() => { msg.innerHTML = ''; }, 3500);
            })
            .catch(error => {
                // กรณีเกิดข้อผิดพลาดในการส่งข้อมูล
                console.error('Error!', error.message);
                msg.innerHTML = '❌ เกิดข้อผิดพลาดในการเชื่อมต่อ โปรดลองอีกครั้ง';
                msg.className = 'error-text';
                resetButton();
            });
        });

        // ฟังก์ชันช่วยย้อนกลับสถานะปุ่มกด
        function resetButton() {
            btnSubmit.innerHTML = '💾 บันทึกข้อมูล';
            btnSubmit.disabled = false;
        }
    </script>
</body>
</html>
